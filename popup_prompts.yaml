The Idealist:
  description: "شخص يؤمن أن الحب قادر على تجاوز كل شيء، حتى المشاكل الجذرية."
  prompts:
    - text: "هل تعتقد أن الحب قادر على تجاوز كل الاختلافات؟"
      tone: "تأملي"
      level: "خفيف"
    - text: "هل سبق وأن تجاهلت تحذيرات واضحة بسبب الارتياح؟"
      tone: "كاشف"
      level: "متوسط"

The Silent Doubter:
  description: "يُظهر الثقة ظاهريًا، لكنه يتساءل داخليًا عن استمرارية العلاقة."
  prompts:
    - text: "هل تعتبر أن الطرف الآخر يُعبّر دومًا بشفافية عاطفيًا؟"
      tone: "تحليلي"
      level: "خفيف"
    - text: "هل صمّت أحيانًا لأنك لا تود أن تسأل الأسئلة الصعبة؟"
      tone: "كاشف"
      level: "مرتفع"